<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariesatticthrift | Best Thrift Store In Your City</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#111827;
  --accent:#2563eb;
  --bg:#f3f4f6;
  --white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:var(--bg);color:#111;}

header{
  background:var(--white);
  padding:18px;
  text-align:center;
  box-shadow:0 3px 12px rgba(0,0,0,0.06);
}

header h1{font-size:22px;font-weight:700;}
header p{font-size:13px;color:#666;}

.filters{
  display:flex;
  gap:10px;
  padding:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.filters button{
  padding:8px 16px;
  border:none;
  border-radius:25px;
  background:#e5e7eb;
  cursor:pointer;
  transition:0.3s;
}

.filters button.active,
.filters button:hover{
  background:var(--accent);
  color:white;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body{padding:12px;}

.card h3{font-size:15px;margin-bottom:5px;}
.card p{font-size:13px;color:#666;margin-bottom:8px;}
.price{font-weight:600;margin-bottom:10px;}

.card button{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.card button:hover{opacity:0.9;}

.cart-icon{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--primary);
  color:white;
  padding:16px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  font-size:12px;
  padding:3px 7px;
  border-radius:50%;
}

.cart-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.cart-content{
  background:white;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:12px;
  padding:15px;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.95);}
  to{opacity:1;transform:scale(1);}
}

.cart-item{
  border-bottom:1px solid #ddd;
  padding:8px 0;
}

.cart-item h4{font-size:14px;}
.cart-controls{
  margin-top:5px;
}

.cart-controls button{
  padding:3px 7px;
  margin-right:5px;
}

.total{
  font-weight:700;
  margin-top:10px;
}

.checkout-btn{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.close-btn{
  text-align:right;
  cursor:pointer;
  color:red;
  font-size:14px;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25D366;
  color:white;
  padding:12px 16px;
  border-radius:50px;
  text-decoration:none;
  font-size:14px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<header>
<h1>ARIESATTICTHRIFT</h1>
<p>Best Thrift Store In Your City | Nashik, Maharashtra</p>
</header>

<div class="filters">
<button class="active" onclick="filterProducts('All',event)">All</button>
<button onclick="filterProducts('Jeans',event)">Jeans</button>
<button onclick="filterProducts('Tshirts',event)">Tshirts</button>
<button onclick="filterProducts('Jackets',event)">Jackets</button>
</div>

<div class="products" id="productList"></div>

<div class="cart-icon" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

<a class="whatsapp" href="https://wa.me/918668330318" target="_blank">
Chat on WhatsApp
</a>

<div class="cart-modal" id="cartModal">
<div class="cart-content">
<div class="close-btn" onclick="closeCart()">Close ✖</div>
<div id="cartItems"></div>
<div class="total" id="grandTotal"></div>
<button class="checkout-btn" onclick="showCheckout()">Place Order</button>

<form id="checkoutForm" action="https://formspree.io/f/xdalvqep" method="POST" style="display:none;margin-top:10px;">
<input type="text" name="Customer Name" placeholder="Your Name" required style="width:100%;margin-bottom:6px;padding:8px;">
<input type="tel" name="Phone Number" placeholder="Phone Number" required style="width:100%;margin-bottom:6px;padding:8px;">
<textarea name="Delivery Address" placeholder="Delivery Address" required style="width:100%;margin-bottom:6px;padding:8px;"></textarea>
<textarea name="Special Instructions" placeholder="Special Instructions (Optional)" style="width:100%;margin-bottom:6px;padding:8px;"></textarea>

<input type="hidden" name="Complete Order Details" id="orderSummary">

<button type="submit" class="checkout-btn">Submit Order</button>
</form>

<div id="confirmation" style="display:none;margin-top:10px;color:green;text-align:center;">
Order placed! ARIESATTICTHRIFT will contact you on WhatsApp to confirm.
<br><br>
<a href="https://wa.me/918668330318" target="_blank">Click here to message us on WhatsApp</a>
</div>

</div>
</div>

<script>
const products=[
{
id:1,
name:"Straight fit Black Jeans",
price:200,
category:"Jeans",
image:"https://i.ibb.co/b5Zg706h/IMG-4272.jpg",
description:"best fit, full cotton"
},

{
id:2,
name:"Yellow Jacket",
price:699,
category:"Jackets",
image:"https://i.ibb.co/4n8vq8rY/ff406012-394f-4e41-a98a-89bbb288d0b5.jpg",
description:"Premium quality, branded Jacket"
},

{
id:3,
name:"Red & White Jacket",
price:699,
category:"Jackets",
image:"https://i.ibb.co/93H9r3VW/4ea09c16-34fd-4135-aa76-7e9b7f97accb.jpg",
description:"Premium quality, branded Jacket"
}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function renderProducts(filter="All"){
const list=document.getElementById("productList");
list.innerHTML="";
products
.filter(p => filter === "All" || p.category === filter)
.forEach(p => {
list.innerHTML+=`
<div class="card">
<img 
  src="${p.image}" 
  alt="${p.name}" 
  loading="lazy"
  style="cursor:pointer;"
  onclick="openImage('${p.image}')"
>
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.description}</p>
<div class="price">₹${p.price}</div>

<select id="size-${p.id}" style="width:100%;margin-bottom:8px;padding:6px;">
<option value="">Select Size</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
</select>

<button onclick="addToCart(${p.id})">Add to Cart</button>
</div>
</div>`;
});
}
function openImage(src){
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("popupImage").src = src;
}

function closeImage(){
  document.getElementById("imageModal").style.display = "none";
}
function addToCart(id){
const size=document.getElementById(`size-${id}`).value;
if(!size){
alert("Please select size");
return;
}

const product=products.find(p=>p.id===id);
const existing=cart.find(p=>p.id===id && p.size===size);

if(existing){
existing.qty++;
}else{
cart.push({...product,qty:1,size:size});
}
updateCart();
}

function updateCart(){
localStorage.setItem("cart",JSON.stringify(cart));
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0);
renderCart();
}

function renderCart(){
const box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(item=>{
let subtotal=item.price*item.qty;
total+=subtotal;

box.innerHTML+=`
<div class="cart-item">
<h4>${item.name}</h4>
Size: ${item.size}<br>
₹${item.price} × ${item.qty} = ₹${subtotal}
<div class="cart-controls">
<button onclick="changeQty(${item.id},'${item.size}',-1)">-</button>
<button onclick="changeQty(${item.id},'${item.size}',1)">+</button>
<button onclick="removeItem(${item.id},'${item.size}')">Remove</button>
</div>
</div>`;
});

document.getElementById("grandTotal").innerText="Grand Total: ₹"+total;
}

function changeQty(id,size,val){
let item=cart.find(p=>p.id===id && p.size===size);
item.qty+=val;
if(item.qty<=0) removeItem(id,size);
updateCart();
}

function removeItem(id,size){
cart=cart.filter(p=>!(p.id===id && p.size===size));
updateCart();
}

function openCart(){document.getElementById("cartModal").style.display="flex";}
function closeCart(){document.getElementById("cartModal").style.display="none";}

function showCheckout(){
if(cart.length===0){alert("Your cart is empty");return;}
document.getElementById("checkoutForm").style.display="block";
generateSummary();
}

function generateSummary(){
let text="ARIESATTICTHRIFT - NEW ORDER\n\n";
let total=0;

cart.forEach(i=>{
let sub=i.price*i.qty;
total+=sub;
text+=`${i.name}\nSize: ${i.size}\nQuantity: ${i.qty}\nSubtotal: ₹${sub}\n\n`;
});

text+="Grand Total: ₹"+total;
document.getElementById("orderSummary").value=text;
}

document.getElementById("checkoutForm").addEventListener("submit",function(){
localStorage.removeItem("cart");
cart=[];
updateCart();
document.getElementById("checkoutForm").style.display="none";
document.getElementById("confirmation").style.display="block";
});

renderProducts();
updateCart();
</script>
<!-- Image Popup -->
<div id="imageModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
justify-content:center;
align-items:center;
">

  <span onclick="closeImage()" style="
  position:absolute;
  top:20px;
  right:25px;
  font-size:30px;
  color:white;
  cursor:pointer;
  ">✖</span>

  <img id="popupImage" style="
  max-width:90%;
  max-height:90%;
  border-radius:10px;
  ">
</div>
</body>
</html>
